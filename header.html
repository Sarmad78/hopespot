<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" href="script.js">
  <script src="script.js"></script>
</head>

<style>
  body {
    background-color: #F1F7FE;
    padding: 0;
    margin: 0;
  }

  .header {
    background-color: #1e319d;
    color: white;
    border-radius: 0px 0px 10px 10px;
    padding-top: 2%;
    padding-bottom: 2%;
  }

  #menu {
    width: 45%;
    margin-top: 10%;
    margin-left: 16%;
  }

  .sidenav {
    height: 100%;
    width: 0;
    position: fixed;
    z-index: 1;
    top: 0;
    left: 0;
    background-color: #000000ad;
    overflow-x: hidden;
    transition: 0.5s;
    padding-top: 60px;
  }

  .sidenav a {
    padding: 8px 8px 8px 32px;
    text-decoration: none;
    font-size: 25px;
    color: #ffffff;
    display: block;
    transition: 0.3s;
  }

  .sidenav a:hover {
    color: #f1f1f1;
  }

  .sidenav .closebtn {
    position: absolute;
    top: 0;
    right: 25px;
    font-size: 36px;
    margin-left: 50px;
  }

  .sidenav .closebtn:hover {
    color: #f1f1f1;
    cursor: pointer;
  }

  #text {
    text-align: center;
    margin-top: 4%;
  }

  #bell {
    width: 42%;
    margin-top: 10%;
    margin-left: 43%;
  }
</style>

<body>
  <div id="header">
    <header>
      <div class="header">
        <div class="row" style="width: 100%;">
          <div class="col-4 ">
            <img src="/FYP/images/icons8-menu-48.png" alt="" style="width: 31%; margin-left: 10%;"
              id="menuBtn">
          </div>
          <div class="col-4 " style="text-align: center;">
            <h4>HopeSpot</h4>
          </div>
          <div class="col-4 " style="text-align: right; padding: 0;">
            <img src="/FYP/images/icons8-bell-48.png" alt="" style="width: 24%;">
          </div>
        </div>
      </div>
    </header>
  </div>

  <!-- Side menu -->
  <div id="sideMenu" class="sidenav">
    <a href="update_profile.php">Profile</a>
    
    <a href="login.php">Logout</a>
    <a href="javascript:void(0)" class="closebtn" id="closeBtn">&times;</a>
  </div>

  <script>
    function attachEventListeners() {
      // Open the side menu
      document.getElementById("menuBtn").addEventListener("click", function () {
        document.getElementById("sideMenu").style.width = "250px";
      });

      // Close the side menu
      document.getElementById("closeBtn").addEventListener("click", function () {
        document.getElementById("sideMenu").style.width = "0";
      });
    }

    // Fetch and include the header
    fetch('header.html')
      .then(response => response.text())
      .then(html => {
        document.getElementById('header').innerHTML = html;
        attachEventListeners(); // Attach event listeners after inserting the header
      });
  </script>
</body>

</html>
