<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <title>Document</title>
</head>
<style>
  body {
    margin: 0%;
    padding: 0%;
    box-sizing: border-box;
    font-family: 'Rubik', sans-serif !important;
    background-color: #F1F7FE;

  }

  .brand {
    margin-top: 5%;
    text-align: center;
    color: #1e319d;
    background: #c1f6e5;
    border-radius: 10px;
    width: 64%;
    margin-left: 19%;
    box-shadow: 0px 4px 8px -1px #00000030;

  }



  .header {
    background-color: #1e319d;
    color: white;
    border-radius: 0px 0px 10px 10px;
    padding-top: 2%;
    padding-bottom: 2%;
  }

  .uploadimg {
    background: white;
    border-radius: 3px;
    box-shadow: 0px 4px 4px 4px #00000014;
    text-align: center;

  }

  .arrows {
    margin-top: 37px;
  }

  .scan {
    background: white;
    border-radius: 3px;
    box-shadow: 0px 4px 4px 4px #00000014;
    text-align: center;

  }



  #footer1 {
    bottom: 0%;
    position: fixed;
    width: 100%;
    background: #F1F7FE;
  }

  /* Style the footer container */
  .footer {
    display: flex;
    box-shadow: 0px 0px 4px 0px;
    /* Change the background color */
    justify-content: space-around;
    padding: 10px 0;
  }
</style>

<body>
  <header>
    <div class="header">
      <div class="row" style="width: 100%;">
        <div class="col-4 ">
          <img src="/fyp/images/icons8-menu-48.png" alt="" style="width: 31%; margin-left: 10%;">
        </div>
        <div class="col-4 " style="text-align: center;">
          <h4>HopeSpot</h4>
        </div>
        <div class="col-4 " style="text-align: right;
                padding: 0;">
          <img src="/fyp/images/icons8-bell-48.png" alt="" style="width: 24%;">
        </div>

      </div>
    </div>
  </header>
  <div class="container-fluid">

    

    <div class="brand">
      <h4 style="line-height: 249%;">Found Person </h4>
    </div>
     <div class="row" style="margin-top: 20%;">  
      <div class="col-5">
        <div class="uploadimg">
          <img src="/fyp/images/Fizz.png" alt="Uplaod Image">

          <!-- <input type="file" name="file" id="upimage"> -->
        </div>
      </div>
      <div class="col-2">
        <div class="arrows">
          <img src="/fyp/images/right (1).gif" alt="" style="width:82%;">
          <img src="/fyp/images/left.gif" alt="" style="width:82%;">
        </div>
      </div>
      <div class="col-5">
        <div class="scan">
          <img src="/fyp/images/Fizz.png" alt="Scan">

        </div>
      </div>
    </div>
    <div class="finddetails" style=" margin-top:15%; font-weight: bold; margin-left: 2%;">
      <span> Name </span> <br>
      <span> Father Name </span> <br>
      <span> Age </span> <br>
      <span> Details </span>

    </div>

    <div class="seemore">
      <a href="/Details.html" style=" text-decoration: none;
      margin-left: 72%;">See More...</a>
    </div>

  </div>
  <footer>

    <div id="footer1">

      <div class="row" id="row" style="width:107%; ">

        <div class="col-12" style="padding: 0%;">
          <div class="footer">
            <div class="footer-column">

              <a class="nav-item nav-link " href="/fyp/home.html">
                <img src="/fyp/images/home.png" alt="">
              </a>

            </div>
            <div class="footer-column">

              <a class="nav-item nav-link " href="/fyp/newsfeed.html">
                <img src="/fyp/images/news.png" alt="">
              </a>

            </div>
            <div class="footer-column">

              <a class="nav-item nav-link " href="/fyp/feedback.html">
                <img src="/fyp/images/comments.png" alt="">
              </a>

            </div>
            <div class="footer-column">

              <a class="nav-item nav-link " id="nav-home-tab" data-toggle="tab" href="/fyp/profile.html" role="tab"
                aria-controls="nav-home" aria-selected="true">
                <img src="/fyp/images/maleuser.png" alt="">
              </a>


            </div>
          </div>
        </div>
      </div>
    </div>
  </footer>
</body>

</html>
