<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <title>Found Person - HopeSpot</title>
</head>
<style>
  body {
    margin: 0; padding: 0;
    background-color: #F1F7FE;
    font-family: sans-serif;
    padding-bottom: 80px;
  }
  .header {
    background-color: #1e319d;
    color: white;
    border-radius: 0 0 10px 10px;
    padding: 14px 16px;
    text-align: center;
  }
  .header h4 { margin: 0; font-size: 18px; }

  .page-title {
    text-align: center;
    color: #1e319d;
    font-weight: 700;
    font-size: 20px;
    margin: 20px 0 8px 0;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 13px;
    margin-bottom: 24px;
  }

  /* Action Cards */
  .action-row {
    display: flex;
    gap: 14px;
    margin: 0 16px 24px 16px;
  }
  .action-card {
    flex: 1;
    background: white;
    border-radius: 14px;
    box-shadow: 0 2px 10px #00000018;
    padding: 20px 10px;
    text-align: center;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border 0.2s, transform 0.1s;
  }
  .action-card:active { transform: scale(0.97); }
  .action-card.selected { border-color: #1e319d; }
  .action-card .icon { font-size: 36px; margin-bottom: 8px; }
  .action-card p { font-weight: 700; font-size: 13px; color: #333; margin: 0; }

  /* Upload section */
  .upload-section {
    margin: 0 16px 16px 16px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 2px 10px #00000018;
    padding: 20px;
    text-align: center;
  }
  .upload-section label {
    display: block;
    border: 2px dashed #1e319d;
    border-radius: 10px;
    padding: 24px;
    cursor: pointer;
    color: #1e319d;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 16px;
  }
  .upload-section label:hover { background: #f0f4ff; }
  .upload-section input[type="file"] { display: none; }
  #preview-img {
    width: 100%;
    max-height: 200px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 12px;
    display: none;
  }
  .submit-btn {
    width: 100%;
    background: #1e319d;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  .submit-btn:disabled { background: #aaa; cursor: not-allowed; }

  /* Camera section */
  .camera-section {
    margin: 0 16px 16px 16px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 2px 10px #00000018;
    padding: 20px;
    text-align: center;
    display: none;
  }
  #camera-feed {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 12px;
    display: none;
    max-height: 250px;
    object-fit: cover;
  }
  #captured-img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 12px;
    display: none;
    max-height: 250px;
    object-fit: cover;
  }
  .cam-btn {
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 10px;
  }
  .cam-start { background: #2ed573; color: white; }
  .cam-capture { background: #1e319d; color: white; display: none; }
  .cam-submit { background: #ff4757; color: white; display: none; }
  .cam-retake { background: #f1f2f6; color: #333; display: none; }

  /* Result */
  .result-box {
    margin: 0 16px 16px 16px;
    background: #fff3cd;
    border-radius: 10px;
    padding: 12px 16px;
    color: #856404;
    font-weight: 600;
    font-size: 14px;
    text-align: center;
    {% if not result %}display: none;{% endif %}
  }

  /* Footer */
  #footer1 { bottom: 0; position: fixed; width: 100%; background: #F1F7FE; }
  .footer { display: flex; box-shadow: 0 0 4px 0; justify-content: space-around; padding: 10px 0; }
</style>
<body>

<div class="header"><h4>HopeSpot</h4></div>

<div class="page-title">Found Person</div>
<div class="subtitle">Photo upload karein ya camera se scan karein</div>

{% if result %}
<div class="result-box">{{ result }}</div>
{% endif %}

<!-- Action Buttons -->
<div class="action-row">
  <div class="action-card selected" id="btn-upload" onclick="showSection('upload')">
    <div class="icon">🖼️</div>
    <p>Upload Image</p>
  </div>
  <div class="action-card" id="btn-scan" onclick="showSection('scan')">
    <div class="icon">📷</div>
    <p>Scan</p>
  </div>
</div>

<!-- Upload Section -->
<div class="upload-section" id="section-upload">
  <form action="/recognize" method="POST" enctype="multipart/form-data" id="upload-form">
    <label for="file-input">
      📁 Image select karne ke liye tap karein
    </label>
    <input type="file" id="file-input" name="file" accept="image/*" onchange="previewFile(event)">
    <img id="preview-img" src="" alt="Preview">
    <button type="submit" class="submit-btn" id="upload-btn" disabled>
      🔍 Recognize Karein
    </button>
  </form>
</div>

<!-- Camera / Scan Section -->
<div class="camera-section" id="section-scan">
  <video id="camera-feed" autoplay playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <img id="captured-img" src="" alt="Captured">

  <button class="cam-btn cam-start" id="cam-start-btn" onclick="startCamera()">
    📷 Camera Kholein
  </button>
  <button class="cam-btn cam-capture" id="cam-capture-btn" onclick="capturePhoto()">
    ⚡ Photo Lein
  </button>
  <button class="cam-btn cam-retake" id="cam-retake-btn" onclick="retakePhoto()">
    🔄 Dobara Lein
  </button>
  <button class="cam-btn cam-submit" id="cam-submit-btn" onclick="submitCapture()">
    🔍 Recognize Karein
  </button>
</div>

<!-- Footer -->
<footer>
  <div id="footer1">
    <div class="row" style="width:107%;">
      <div class="col-12" style="padding:0%;">
        <div class="footer">
          <div class="footer-column">
            <a href="http://localhost/FYP/home.php"><img src="/static/images/home.png" alt=""></a>
          </div>
          <div class="footer-column">
            <a href="http://localhost/FYP/newsfeed.php"><img src="/static/images/news.png" alt=""></a>
          </div>
          <div class="footer-column">
            <a href="http://localhost/FYP/feedback.php"><img src="/static/images/comments.png" alt=""></a>
          </div>
          <div class="footer-column">
            <a href="http://localhost/FYP/update_profile.php"><img src="/static/images/maleuser.png" alt=""></a>
          </div>
        </div>
      </div>
    </div>
  </div>
</footer>

<script>
// Section toggle
function showSection(section) {
  document.getElementById('section-upload').style.display = section === 'upload' ? 'block' : 'none';
  document.getElementById('section-scan').style.display = section === 'scan' ? 'block' : 'none';
  document.getElementById('btn-upload').classList.toggle('selected', section === 'upload');
  document.getElementById('btn-scan').classList.toggle('selected', section === 'scan');

  if (section !== 'scan') stopCamera();
}

// Upload preview
function previewFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('preview-img');
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('upload-btn').disabled = false;
  };
  reader.readAsDataURL(file);
}

// Camera
let stream = null;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    const video = document.getElementById('camera-feed');
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('cam-start-btn').style.display = 'none';
    document.getElementById('cam-capture-btn').style.display = 'block';
  } catch(e) {
    alert('Camera nahi khul raha: ' + e.message);
  }
}

function capturePhoto() {
  const video = document.getElementById('camera-feed');
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  const imgData = canvas.toDataURL('image/jpeg');
  const capturedImg = document.getElementById('captured-img');
  capturedImg.src = imgData;
  capturedImg.style.display = 'block';
  video.style.display = 'none';
  stopCamera();

  document.getElementById('cam-capture-btn').style.display = 'none';
  document.getElementById('cam-retake-btn').style.display = 'block';
  document.getElementById('cam-submit-btn').style.display = 'block';
}

function retakePhoto() {
  document.getElementById('captured-img').style.display = 'none';
  document.getElementById('cam-retake-btn').style.display = 'none';
  document.getElementById('cam-submit-btn').style.display = 'none';
  document.getElementById('cam-start-btn').style.display = 'block';
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
}

async function submitCapture() {
  const canvas = document.getElementById('canvas');
  const btn = document.getElementById('cam-submit-btn');
  btn.textContent = '⏳ Processing...';
  btn.disabled = true;

  canvas.toBlob(async blob => {
    const formData = new FormData();
    formData.append('file', blob, 'capture.jpg');

    try {
      const response = await fetch('/recognize', {
        method: 'POST',
        body: formData
      });
      // Response HTML mein redirect hoga
      const html = await response.text();
      document.open();
      document.write(html);
      document.close();
    } catch(e) {
      alert('Error: ' + e.message);
      btn.textContent = '🔍 Recognize Karein';
      btn.disabled = false;
    }
  }, 'image/jpeg', 0.9);
}
</script>
</body>
</html>
